exchange: okx_swap
data_source: websocket
failover:
  enabled: true
  stale_after_seconds: 20
  switch_cooldown_seconds: 45
  candidates:
  - exchange: okx_swap
    data_source: websocket
  - exchange: okx_swap
    data_source: rest
rest_poll_interval_seconds: 5
rest_per_symbol_delay_ms: 150
oi_poll_interval_seconds: 30
funding_poll_interval_seconds: 60
microstructure:
  enabled: true
  depth_levels: 10
  depth_interval: 500ms
  rest_depth_poll_interval_seconds: 5
  rest_liquidation_poll_interval_seconds: 15
symbols:
- BNBUSDT
- SOLUSDT
- DOGEUSDT
- ETHUSDT
- BTCUSDT
- HYPEUSDT
- XRPUSDT
window_seconds: 300
warmup_seconds: 60
alert_cooldown_seconds: 120
storage:
  enabled: true
  path: data/monitor.db
  snapshot_interval_seconds: 60
users:
  enabled: true
  path: data/user_configs.json
auth:
  enabled: true
  users_path: data/auth_users.json
  secret_path: data/auth_secret.key
  jwt_secret: ''
  allow_registration: false
  token_ttl_seconds: 604800
telegram:
  enabled: false
  bot_token: ''
  chat_ids: []
  users: []
telegram_bot:
  enabled: true
  poll_interval_seconds: 2
  request_timeout_seconds: 20
  ai_cooldown_seconds: 20
symbol_thresholds: {}
ai:
  enabled: true
  provider: anthropic
  api_key: ''
  model: deepseek-v4-flash
  base_url: https://token.sensenova.cn
  activation_threshold: 30
  triggers:
    mode: any
    conditions:
      score:
        enabled: true
        threshold: 30
      quote_volume_1m:
        enabled: false
        threshold: 500000
      volume_multiplier:
        enabled: false
        threshold: 3
      price_move_pct_1m_abs:
        enabled: false
        threshold: 0.8
      oi_change_pct_5m_abs:
        enabled: false
        threshold: 1.5
      liquidation_total_quote_1m:
        enabled: false
        threshold: 250000
  cache_ttl_seconds: 300
  retry_cooldown_seconds: 120
  request_timeout_seconds: 30
  max_tokens: 500
  auto_analyze_enabled: false
dashboard:
  enabled: true
  host: 127.0.0.1
  port: 8765
  theme: dark
thresholds:
  price_move_pct_1m: 0.8
  price_move_pct_5m: 1.8
  volume_multiplier: 3.0
  taker_buy_ratio_high: 0.7
  taker_buy_ratio_low: 0.3
  min_quote_volume_1m: 500000
  anomaly_score: 70
  oi_change_pct_5m: 1.5
  funding_rate_abs: 0.0005
  liquidation_enabled: true
  liquidation_quote_1m: 250000
  spread_enabled: true
  spread_bps: 4.0
  depth_imbalance_enabled: true
  depth_imbalance_abs: 0.18
  depth_drop_enabled: true
  depth_drop_pct_1m: 18.0
